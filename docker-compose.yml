version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: dapp-postgres-db
    restart: always
    environment:
      POSTGRES_USER: astraea_user
      POSTGRES_PASSWORD: astraea_password
      POSTGRES_DB: astraea_dapp_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U astraea_user -d astraea_dapp_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dapp-redis-cache
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: dapp-express-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DATABASE_URL=postgresql://astraea_user:astraea_password@db:5432/astraea_dapp_db?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=super-secret-key-astraea-dapp
      - CLIENT_URL=http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: dapp-nextjs-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
