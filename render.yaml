services:
  - type: web
    name: astraea-backend
    env: node
    rootDir: server
    buildCommand: npm install && npm run prisma:generate && npm run build
    startCommand: npm run start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true # Automatically generates a secure random JWT secret
      - key: DATABASE_URL
        fromDatabase:
          name: astraea-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: astraea-redis
          type: redis
          property: connectionString
      - key: CLIENT_URL
        value: http://localhost:3000 # Can be updated with your vercel URL later

  - type: redis
    name: astraea-redis
    plan: free

databases:
  - name: astraea-db
    plan: free
